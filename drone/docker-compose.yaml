---
version: '3.3'
services:

  drone:
    container_name: drone
    image: drone/drone:1
    volumes:
      - /var/lib/drone:/data
    environment:
      - DRONE_GITEA_SERVER=http://xxx.xxx.xxx.xx:3000
      - DRONE_GITEA_CLIENT_ID=
      - DRONE_GITEA_CLIENT_SECRET=
      - DRONE_RPC_SECRET=
      - DRONE_SERVER_HOST=
      - DRONE_SERVER_PROTO=http
      - DRONE_USER_CREATE=username:,admin:true
    ports:
      - 80:80
      - 443:443
    restart: always

  drone-runner:
    container_name: runner
    image: drone/drone-runner-docker:1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_HOST=
      - DRONE_RPC_SECRET=
      - DRONE_RUNNER_CAPACITY=1
      - DRONE_RUNNER_NAME=dronner
    ports:
      - 3000:3000
    restart: always
    depends_on:
      - drone
